<style>
/* ============================================================
   THEME
   Travel-app aesthetic: warm linen + deep pine + sunset terracotta.
   Inspired by Provençal earthenware, hand-painted ceramic tiles,
   and the worn-stone palette of Les Baux. Restrained, not flashy.
   ============================================================ */
:root {
  /* Light mode (default) */
  --bg: #f5ede1;            /* warm linen */
  --bg-elev: #fbf6ec;       /* card */
  --bg-sunk: #ece2d2;       /* recessed/sticky */
  --ink: #1a1a1a;
  --ink-2: #4a4a4a;
  --ink-3: #888178;
  --line: #e3d8c4;
  --line-strong: #c9bba2;
  --accent: #1a3a3a;        /* deep pine */
  --accent-soft: #d3dbd5;
  --warm: #d97757;          /* terracotta */
  --warm-soft: #f0d9c8;
  --gold: #b58a3a;
  --danger: #b3493b;
  --shadow-sm: 0 1px 2px rgba(60, 40, 20, 0.06);
  --shadow-md: 0 4px 16px rgba(60, 40, 20, 0.08);
  --shadow-lg: 0 12px 40px rgba(60, 40, 20, 0.12);
  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 20px;
  --tap: 44px;
  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --serif: 'Fraunces', Georgia, 'Times New Roman', serif;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0e1818;
    --bg-elev: #182525;
    --bg-sunk: #0a1212;
    --ink: #f0e8db;
    --ink-2: #c8bfb0;
    --ink-3: #7a7568;
    --line: #28342f;
    --line-strong: #3a4842;
    --accent: #e8d9b8;        /* warm cream as accent in dark */
    --accent-soft: #2a3a36;
    --warm: #e8957a;
    --warm-soft: #3a2a22;
    --gold: #d4a857;
    --danger: #e07565;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
  }
}

[data-theme="light"] {
  --bg: #f5ede1; --bg-elev: #fbf6ec; --bg-sunk: #ece2d2;
  --ink: #1a1a1a; --ink-2: #4a4a4a; --ink-3: #888178;
  --line: #e3d8c4; --line-strong: #c9bba2;
  --accent: #1a3a3a; --accent-soft: #d3dbd5;
  --warm: #d97757; --warm-soft: #f0d9c8;
  --gold: #b58a3a; --danger: #b3493b;
}
[data-theme="dark"] {
  --bg: #0e1818; --bg-elev: #182525; --bg-sunk: #0a1212;
  --ink: #f0e8db; --ink-2: #c8bfb0; --ink-3: #7a7568;
  --line: #28342f; --line-strong: #3a4842;
  --accent: #e8d9b8; --accent-soft: #2a3a36;
  --warm: #e8957a; --warm-soft: #3a2a22;
  --gold: #d4a857; --danger: #e07565;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overscroll-behavior-y: contain;
}
body {
  min-height: 100svh;
  padding-bottom: calc(72px + var(--safe-b)); /* room for tab bar */
}

/* Decorative paper grain — very subtle, never obtrusive */
body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.3  0 0 0 0 0.25  0 0 0 0 0.18  0 0 0 0.025 0'/></filter><rect width='180' height='180' filter='url(%23n)'/></svg>");
  opacity: 0.7;
  mix-blend-mode: multiply;
}
[data-theme="dark"] body::before, @media (prefers-color-scheme: dark) {}
@media (prefers-color-scheme: dark) {
  body::before { mix-blend-mode: screen; opacity: 0.35; }
}

button, a.btn {
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 500;
  border: none;
  background: transparent;
  color: inherit;
  cursor: pointer;
  text-decoration: none;
}
a { color: var(--accent); text-decoration: none; }
a:active { opacity: 0.7; }

/* ============================================================
   APP SHELL
   ============================================================ */
#app {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100svh;
}
@media (min-width: 720px) {
  #app { max-width: 560px; }
}

/* Top app bar */
.appbar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: color-mix(in srgb, var(--bg) 85%, transparent);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  padding: calc(var(--safe-t) + 12px) 20px 12px;
  border-bottom: 1px solid var(--line);
}
.appbar-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.brand {
  display: flex;
  align-items: baseline;
  gap: 10px;
  min-width: 0;
}
.brand-mark {
  font-family: var(--serif);
  font-style: italic;
  font-size: 22px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: -0.01em;
  flex: none;
}
.brand-sub {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.theme-toggle {
  width: var(--tap);
  height: var(--tap);
  border-radius: 50%;
  display: grid;
  place-items: center;
  color: var(--ink-2);
}
.theme-toggle:hover { color: var(--accent); }
.theme-toggle svg { width: 20px; height: 20px; }

/* Page wrapper */
.page {
  padding: 8px 20px 20px;
  animation: page-in 0.28s ease-out;
}
@keyframes page-in {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Generic typography */
.h-eyebrow {
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 600;
}
.h-display {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 32px;
  line-height: 1.08;
  letter-spacing: -0.015em;
  color: var(--ink);
  margin: 4px 0 16px;
}
.h-display em { font-style: italic; color: var(--warm); font-weight: 400; }
.h-section {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 22px;
  line-height: 1.2;
  letter-spacing: -0.01em;
  margin: 28px 0 12px;
  color: var(--ink);
}
.h-section em { font-style: italic; }

/* ============================================================
   BOTTOM TAB BAR
   ============================================================ */
.tabbar {
  position: fixed;
  left: 0; right: 0;
  bottom: 0;
  z-index: 40;
  padding: 8px 12px calc(var(--safe-b) + 8px);
  background: color-mix(in srgb, var(--bg-elev) 92%, transparent);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-top: 1px solid var(--line);
}
.tabbar-inner {
  max-width: 480px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
}
.tab {
  height: 56px;
  min-width: var(--tap);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  color: var(--ink-3);
  border-radius: var(--radius-sm);
  transition: color 0.15s, background 0.15s;
}
.tab:active { background: var(--bg-sunk); }
.tab[aria-selected="true"] { color: var(--accent); }
.tab svg { width: 22px; height: 22px; }
.tab-label { font-size: 10.5px; font-weight: 600; letter-spacing: 0.02em; }

/* ============================================================
   CARDS
   ============================================================ */
.card {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.card-pad { padding: 16px 18px; }

/* ============================================================
   TODAY VIEW
   ============================================================ */
.today-hero {
  margin: 4px 0 20px;
}
.today-date {
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 600;
}
.today-headline {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 30px;
  line-height: 1.1;
  letter-spacing: -0.015em;
  margin: 6px 0 10px;
  color: var(--ink);
}
.today-headline em { font-style: italic; color: var(--warm); font-weight: 400; }
.today-sub {
  font-size: 15px;
  color: var(--ink-2);
  line-height: 1.5;
}

.event-band {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 18px 0 10px;
}
.event-band-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
}
.event-band-line {
  flex: 1;
  height: 1px;
  background: var(--line);
}
.event-band-label.now { color: var(--warm); }

/* Event card */
.event {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
  position: relative;
}
.event.now {
  border-color: var(--warm);
  box-shadow: 0 0 0 3px var(--warm-soft), var(--shadow-md);
}
.event.dim {
  opacity: 0.62;
  background: transparent;
}
.event.dim .event-title { font-weight: 400; }
.event-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.event-time {
  font-family: var(--serif);
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 0.02em;
  flex: none;
  white-space: nowrap;
}
.event-time .tz {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 600;
  color: var(--ink-3);
  letter-spacing: 0.08em;
  margin-left: 4px;
}
.event-type {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 100px;
  background: var(--accent-soft);
  color: var(--accent);
  flex: none;
}
.event-type.flight { background: color-mix(in srgb, var(--gold) 22%, transparent); color: var(--gold); }
.event-type.hotel { background: var(--accent-soft); color: var(--accent); }
.event-type.car { background: color-mix(in srgb, var(--warm) 18%, transparent); color: var(--warm); }
.event-type.activity { background: color-mix(in srgb, var(--gold) 18%, transparent); color: var(--gold); }
.event-type.dining { background: color-mix(in srgb, var(--warm) 20%, transparent); color: var(--warm); }
.event-title {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 500;
  line-height: 1.25;
  margin: 8px 0 4px;
  color: var(--ink);
  letter-spacing: -0.005em;
}
.event-sub {
  font-size: 13.5px;
  color: var(--ink-2);
  line-height: 1.45;
}
.event-meta {
  margin-top: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 100px;
  background: var(--bg-sunk);
  color: var(--ink-2);
  border: 1px solid var(--line);
}
.chip svg { width: 12px; height: 12px; }
.chip.flag {
  background: color-mix(in srgb, var(--danger) 12%, transparent);
  color: var(--danger);
  border-color: color-mix(in srgb, var(--danger) 30%, transparent);
}

/* Action buttons row */
.action-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px dashed var(--line);
}
.btn-action {
  height: var(--tap);
  min-width: var(--tap);
  padding: 0 14px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  font-weight: 600;
  border-radius: 100px;
  background: var(--bg-sunk);
  color: var(--ink);
  border: 1px solid var(--line-strong);
  transition: transform 0.1s, background 0.15s;
}
.btn-action:active { transform: scale(0.96); }
.btn-action.primary {
  background: var(--accent);
  color: var(--bg-elev);
  border-color: var(--accent);
}
[data-theme="dark"] .btn-action.primary, .btn-action.primary {
  background: var(--accent);
  color: var(--bg);
}
.btn-action.call {
  background: color-mix(in srgb, var(--warm) 16%, transparent);
  color: var(--warm);
  border-color: color-mix(in srgb, var(--warm) 35%, transparent);
}
.btn-action svg { width: 16px; height: 16px; }

.empty {
  padding: 28px 20px;
  text-align: center;
  color: var(--ink-3);
  font-size: 14px;
}
.empty-emoji { font-size: 30px; margin-bottom: 8px; opacity: 0.7; }

/* ============================================================
   ITINERARY VIEW
   ============================================================ */
.day-group {
  margin-bottom: 14px;
}
.day-header {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 16px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  min-height: var(--tap);
  text-align: left;
  transition: background 0.15s;
}
.day-header:active { background: var(--bg-sunk); }
.day-header[aria-expanded="true"] {
  border-bottom-left-radius: 0;
  border-bottom-right-radius: 0;
  border-bottom-color: transparent;
}
.day-header.today {
  border-color: var(--warm);
  box-shadow: 0 0 0 2px var(--warm-soft);
}
.day-num {
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-3);
  font-weight: 500;
}
.day-date {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin-top: 1px;
}
.day-count {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-3);
  display: flex;
  align-items: center;
  gap: 8px;
}
.day-count svg { width: 16px; height: 16px; transition: transform 0.2s; }
.day-header[aria-expanded="true"] .day-count svg { transform: rotate(180deg); }
.day-body {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-top: none;
  border-bottom-left-radius: var(--radius);
  border-bottom-right-radius: var(--radius);
  padding: 4px 12px 12px;
  display: none;
}
.day-body.open { display: block; animation: expand 0.22s ease-out; }
@keyframes expand {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

.stop {
  padding: 14px 6px;
  border-bottom: 1px solid var(--line);
}
.stop:last-child { border-bottom: none; }
.stop-row1 {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.stop-time {
  font-family: var(--serif);
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
  flex: none;
  min-width: 58px;
  padding-top: 2px;
}
.stop-time .tz {
  font-family: var(--sans);
  font-size: 9px;
  font-weight: 600;
  color: var(--ink-3);
  letter-spacing: 0.08em;
  display: block;
  margin-top: 1px;
}
.stop-main { flex: 1; min-width: 0; }
.stop-type {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.stop-title {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 500;
  line-height: 1.25;
  color: var(--ink);
  margin: 2px 0 2px;
}
.stop-sub {
  font-size: 13px;
  color: var(--ink-2);
  line-height: 1.4;
}

.detail-list {
  margin-top: 10px;
  padding: 10px 12px;
  background: var(--bg-sunk);
  border-radius: var(--radius-sm);
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 6px 12px;
  font-size: 13px;
}
.detail-list dt {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  align-self: center;
}
.detail-list dd {
  margin: 0;
  color: var(--ink);
  font-family: var(--sans);
  word-break: break-word;
}
.detail-list dd.mono { font-family: ui-monospace, Menlo, monospace; font-size: 12.5px; }
.detail-list dd.muted { color: var(--ink-3); }

/* ============================================================
   MAP VIEW
   ============================================================ */
.map-wrap {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-md);
  margin-bottom: 16px;
}
.map-svg {
  display: block;
  width: 100%;
  height: auto;
  aspect-ratio: 5 / 3;
  background: linear-gradient(135deg, #e8d9b8 0%, #d3c8a8 50%, #c4b894 100%);
}
[data-theme="dark"] .map-svg {
  background: linear-gradient(135deg, #1a2530 0%, #14202a 50%, #0e1820 100%);
}
@media (prefers-color-scheme: dark) {
  .map-svg { background: linear-gradient(135deg, #1a2530 0%, #14202a 50%, #0e1820 100%); }
}

.map-pin {
  cursor: pointer;
  transition: transform 0.15s;
}
.map-pin:active { transform: scale(0.92); }
.map-pin-circle {
  fill: var(--bg-elev);
  stroke: var(--accent);
  stroke-width: 2.5;
}
.map-pin.active .map-pin-circle {
  fill: var(--warm);
  stroke: var(--warm);
}
.map-pin-num {
  font-family: var(--serif);
  font-weight: 600;
  font-size: 13px;
  fill: var(--accent);
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
}
.map-pin-label {
  font-family: var(--sans);
  font-size: 10.5px;
  font-weight: 600;
  fill: var(--ink);
  pointer-events: none;
  paint-order: stroke;
  stroke: var(--bg-elev);
  stroke-width: 3px;
  stroke-linejoin: round;
}
[data-theme="dark"] .map-pin-label, @media (prefers-color-scheme: dark) {}
.map-pin.active .map-pin-num { fill: var(--bg-elev); }
.map-route {
  fill: none;
  stroke: var(--accent);
  stroke-width: 1.8;
  stroke-dasharray: 4 3;
  opacity: 0.45;
}

.map-list { margin-top: 12px; }
.map-list-item {
  display: flex;
  align-items: flex-start;

.sug-intro {

}

.sug-leg {

}
.sug-leg-head {

  align-items: baseline;
  justify-content: space-between;

  font-weight: 500;

}
.sug-leg-dates {

  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
}

.sug {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
}
.sug-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 100px;
  background: var(--warm-soft);
  color: var(--warm);
  margin-bottom: 8px;
}
.sug-title {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 500;
  line-height: 1.25;

}
.sug-why {

  line-height: 1.5;
  margin-bottom: 8px;

.sug-why::before {

.sug-why::after { content: '"'; font-family: var(--serif); font-style: italic; font-size: 18px; color: var(--warm); margin-left: 2px; }

.sug-meta {

  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 8px;

   ============================================================ */

.search-input {

  padding: 0 16px 0 44px;

  border: 1px solid var(--line);
  font-family: var(--sans);
  font-size: 15px;
  color: var(--ink);
  box-shadow: var(--shadow-sm);
  outline: none;
}
.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.search-input::placeholder { color: var(--ink-3); }
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 20px;
  color: var(--ink-3);
  pointer-events: none;
}
.search-clear {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: none;
  place-items: center;
  color: var(--ink-3);

.search-clear.show { display: grid; }
.search-clear:active { background: var(--bg-sunk); }
.search-results {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
mark.hl { background: color-mix(in srgb, var(--warm) 28%, transparent); color: var(--ink); padding: 0 2px; border-radius: 3px; }

/* ============================================================
   OFFLINE / STATUS PILL
   ============================================================ */
.status-pill {
  position: fixed;
  bottom: calc(80px + var(--safe-b));
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: var(--bg);
  padding: 8px 16px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  z-index: 60;
  box-shadow: var(--shadow-lg);
  display: none;
  animation: pop-in 0.25s ease-out;
}
.status-pill.show { display: block; }
.status-pill.offline { background: var(--danger); color: white; }
@keyframes pop-in {
  from { opacity: 0; transform: translate(-50%, 6px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}

/* ============================================================
   FOOTER / META
   ============================================================ */
.footer-note {
  margin: 28px 0 8px;
  text-align: center;
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.08em;
  font-style: italic;
  font-family: var(--serif);

/* Decorative top hairline rule (Provençal flair) */
.rule-ornate {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 14px 0;
  color: var(--ink-3);
}
.rule-ornate::before, .rule-ornate::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--line-strong), transparent);
}
.rule-ornate-mark { font-family: var(--serif); font-style: italic; font-size: 13px; }

/* Hide pages that aren't active */
.page[hidden] { display: none; }

/* Reduce motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

/* Date helpers — work in the trip's local timezone (Europe/Paris when in France) */
function parseDateAt(dateStr, timeStr) {
  /* dateStr 'YYYY-MM-DD', timeStr 'HH:MM' (both treated as wall time of the event's tz) */
  if (!dateStr) return null;
  const [y, m, d] = dateStr.split('-').map(Number);
  if (timeStr) {
    const [hh, mm] = timeStr.split(':').map(Number);
    return new Date(y, m - 1, d, hh, mm);
  }
  return new Date(y, m - 1, d);
}

function fmtTime12(t) {
  if (!t) return '';
  const [hh, mm] = t.split(':').map(Number);
  const period = hh >= 12 ? 'PM' : 'AM';
  const h12 = ((hh + 11) % 12) + 1;
  return `${h12}:${String(mm).padStart(2, '0')} ${period}`;
}

function fmtLongDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[dt.getDay()]}, ${months[dt.getMonth()]} ${dt.getDate()}`;
}
function fmtShortDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[dt.getDay()]} · ${months[dt.getMonth()]} ${dt.getDate()}`;
}

/* Today detection — supports manual override via ?day=YYYY-MM-DD for testing */
function getEffectiveToday() {
  const p = new URLSearchParams(location.search);
  if (p.get('day')) return p.get('day');
  const now = new Date();
  /* Use local date as the user is presumed to be reading at the trip's local time */
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

/* Group events by date */
function eventsByDate() {
  const groups = {};
  TRIP.events.forEach(e => {
    if (!groups[e.date]) groups[e.date] = [];
    groups[e.date].push(e);
  });
  Object.values(groups).forEach(arr => arr.sort((a, b) => (a.time || '').localeCompare(b.time || '')));
  return groups;
}

/* Get all trip date strings (between trip start and end inclusive) */
function allTripDates() {
  const out = [];
  const [sy, sm, sd] = TRIP.meta.start.split('-').map(Number);
  const [ey, em, ed] = TRIP.meta.end.split('-').map(Number);
  let cur = new Date(sy, sm - 1, sd);
  const end = new Date(ey, em - 1, ed);
  while (cur <= end) {
    const y = cur.getFullYear();
    const m = String(cur.getMonth() + 1).padStart(2, '0');
    const d = String(cur.getDate()).padStart(2, '0');
    out.push(`${y}-${m}-${d}`);
    cur.setDate(cur.getDate() + 1);
  }
  return out;
}

/* Where are they "based" on a given date? Returns stay key. */
function stayOnDate(dateStr) {
  /* Walk events; the most recent check-in before/on this date that hasn't been checked out wins. */
  let current = null;
  const sortedEvents = [...TRIP.events].sort((a, b) =>
    (a.date + (a.time || '')).localeCompare(b.date + (b.time || ''))
  );
  for (const e of sortedEvents) {
    if (e.date > dateStr) break;
    if (e.type === 'hotel' && e.title.startsWith('Check in')) {
      current = e.stay;
    }
    if (e.type === 'hotel' && e.title.startsWith('Check out') && e.date < dateStr) {
      if (current === e.stay) current = null;
    }
  }
  return current;
}

/* =============================================================
   MAPS DEEP LINK
   ============================================================= */
function isiOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}
function mapsLinkFor(lat, lng, label) {
  /* Use universal Google Maps link — opens in Apple Maps too on iOS if Google not installed */
  const q = encodeURIComponent(label || `${lat},${lng}`);
  /* Apple Maps falls back gracefully; Google Maps takes precedence on Android */
  return `https://www.google.com/maps/search/?api=1&query=${lat},${lng}&query_place_id=${q}`;
}
function mapsDirLink(lat, lng, label) {
  const dest = encodeURIComponent(`${lat},${lng}`);
  return `https://www.google.com/maps/dir/?api=1&destination=${dest}`;
}

/* ----- TODAY ----- */
function renderToday() {
  const root = $('#page-today');
  const today = getEffectiveToday();
  const groups = eventsByDate();
  const tripStart = TRIP.meta.start;
  const tripEnd = TRIP.meta.end;

  let html = '';

  /* Pre-trip */
  if (today < tripStart) {
    const daysOut = Math.ceil((parseDateAt(tripStart) - parseDateAt(today)) / 86400000);
    html += `
      <div class="today-hero">
        <div class="today-date">Counting down</div>
        <h1 class="today-headline">${daysOut} ${daysOut === 1 ? 'day' : 'days'} until <em>Provence</em></h1>
        <p class="today-sub">Trip starts ${fmtLongDate(tripStart)}. Tap "Trip" for the full itinerary.</p>
      </div>
      <div class="rule-ornate"><span class="rule-ornate-mark">✦</span></div>
      <p class="today-sub">${renderFirstEventTeaser()}</p>
    `;
    root.innerHTML = html;
    return;
  }

  /* Post-trip */
  if (today > tripEnd) {
    html += `
      <div class="today-hero">
        <div class="today-date">Bon retour</div>
        <h1 class="today-headline"><em>Welcome home.</em></h1>
        <p class="today-sub">Your trip wrapped up ${fmtLongDate(tripEnd)}. Full itinerary is still available under "Trip" anytime.</p>
      </div>
    `;
    root.innerHTML = html;
    return;
  }

  /* During trip */
  const todays = groups[today] || [];
  const stay = stayOnDate(today);
  const stayInfo = stay ? TRIP.stays[stay] : null;

  /* Determine earlier/now/next/later based on current wall time.
     IMPORTANT: we never hide past events — travellers want full visibility
     of the day. Past items get a softer "Earlier today" band. */
  const nowDate = new Date();
  const nowMin = nowDate.getHours() * 60 + nowDate.getMinutes();
  let nowEv = null, nextEv = null;
  const earlierEv = [];
  const laterEv = [];

  todays.forEach(ev => {
    const [h, m] = (ev.time || '00:00').split(':').map(Number);
    const evMin = h * 60 + m;
    let endMin = evMin + 90; /* default 90 min duration */
    if (ev.endTime && (!ev.endDate || ev.endDate === ev.date)) {
      const [eh, em] = ev.endTime.split(':').map(Number);
      endMin = eh * 60 + em;
    }
    if (nowMin >= evMin && nowMin <= endMin && !nowEv) {
      nowEv = ev;
    } else if (evMin > nowMin && !nextEv) {
      nextEv = ev;
    } else if (evMin > nowMin) {
      laterEv.push(ev);
    } else {
      earlierEv.push(ev);
    }
  });

  /* Headline */
  const dayIndex = allTripDates().indexOf(today) + 1;
  const totalDays = allTripDates().length;
  html += `
    <div class="today-hero">
      <div class="today-date">${fmtLongDate(today)} · Day ${dayIndex} of ${totalDays}</div>
      <h1 class="today-headline">${getTodayHeadline(stayInfo, todays)}</h1>
      ${stayInfo ? `<p class="today-sub">Based at <strong>${stayInfo.shortName}</strong> · ${stayInfo.region}</p>` : ''}
    </div>
  `;

  /* Earlier today (collapsed by default but visible) */
  if (earlierEv.length) {
    html += `<div class="event-band"><span class="event-band-label">Earlier today</span><span class="event-band-line"></span></div>`;
    earlierEv.forEach(ev => html += eventCardHTML(ev, false, true));
  }

  /* Now */
  if (nowEv) {
    html += `<div class="event-band"><span class="event-band-label now">● Now</span><span class="event-band-line"></span></div>`;
    html += eventCardHTML(nowEv, true);
  }

  /* Up next */
  if (nextEv) {
    html += `<div class="event-band"><span class="event-band-label">Up next</span><span class="event-band-line"></span></div>`;
    html += eventCardHTML(nextEv, false);
  }

  /* Later today */
  if (laterEv.length) {
    html += `<div class="event-band"><span class="event-band-label">Later today</span><span class="event-band-line"></span></div>`;
    laterEv.forEach(ev => html += eventCardHTML(ev, false));
  }

  /* Empty day — only when literally no events on this date */
  if (todays.length === 0) {
    html += `
      <div class="event-band"><span class="event-band-label">Free day</span><span class="event-band-line"></span></div>
      <div class="card card-pad">
        <p style="margin:0 0 8px 0; font-family: var(--serif); font-size: 18px; font-style: italic;">No fixed plans today.</p>
        <p style="margin:0; color: var(--ink-2); font-size: 14px;">Check the <strong>Ideas</strong> tab for suggestions near ${stayInfo ? stayInfo.shortName : 'your stay'}.</p>
      </div>
    `;
  }

  /* Tomorrow preview */
  const tomorrow = nextDay(today);
  if (tomorrow && tomorrow <= tripEnd && groups[tomorrow] && groups[tomorrow].length) {
    const firstTom = groups[tomorrow][0];
    html += `
      <div class="event-band"><span class="event-band-label">Tomorrow</span><span class="event-band-line"></span></div>
      <div class="card card-pad" style="cursor:pointer" onclick="document.querySelector('[data-tab=itinerary]').click()">
        <div style="font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 4px">${fmtShortDate(tomorrow)} · first up</div>
        <div style="font-family: var(--serif); font-size: 17px; font-weight: 500; letter-spacing: -0.005em;">${firstTom.title}</div>
        <div style="font-size: 13px; color: var(--ink-2); margin-top: 2px">${fmtTime12(firstTom.time)} ${firstTom.tzAbbr || ''} · ${firstTom.subtitle || ''}</div>
      </div>
    `;
  }

  html += `<div class="footer-note">${TRIP.meta.travelers.join(' · ')}</div>`;
  root.innerHTML = html;
  wireEventCardButtons(root);
}

function getTodayHeadline(stayInfo, todays) {
  if (!todays || !todays.length) {
    if (stayInfo) return `A quiet day in <em>${stayInfo.region.split('—')[0].trim()}</em>.`;
    return `A free day.`;
  }
  /* If a flight or transfer is in the day, headline that */
  const flight = todays.find(e => e.type === 'flight');
  if (flight) {
    if (flight.title.includes('Arrive')) return `<em>Arrival day.</em>`;
    if (flight.title.includes('→ JFK') || flight.title.includes('→ BNA')) return `<em>Heading home.</em>`;
    return `<em>Travel day.</em>`;
  }
  const checkin = todays.find(e => e.type === 'hotel' && e.title.startsWith('Check in'));
  if (checkin) {
    const stay = TRIP.stays[checkin.stay];
    return `Today: <em>${stay.region.split('—')[0].trim()}</em>`;
  }
  if (stayInfo) return `Another day in <em>${stayInfo.region.split('—')[0].trim()}</em>.`;
  return todays[0].title;
}

function renderFirstEventTeaser() {
  const first = TRIP.events[0];
  return `First up: <strong>${first.title}</strong> — ${fmtShortDate(first.date)}, ${fmtTime12(first.time)} ${first.tzAbbr}.`;
}

function nextDay(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d + 1);
  return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
}

function eventCardHTML(ev, isNow, isDimmed) {
  const typeIcon = ICON[ev.type] || ICON.activity;
  const stayPhone = ev.stay && TRIP.stays[ev.stay] ? TRIP.stays[ev.stay].phone : null;
  const phone = ev.meta?.Phone || stayPhone;
  const conf = ev.meta?.Confirmation;
  const addr = ev.meta?.Address || (ev.stay && TRIP.stays[ev.stay] ? TRIP.stays[ev.stay].address : null);

  return `
    <article class="event ${isNow ? 'now' : ''} ${isDimmed ? 'dim' : ''}">
      <div class="event-header">
        <span class="event-time">${fmtTime12(ev.time)}${ev.endTime && (!ev.endDate || ev.endDate === ev.date) ? ` – ${fmtTime12(ev.endTime)}` : ''}<span class="tz">${ev.tzAbbr || ''}</span></span>
        <span class="event-type ${ev.type}">${ev.type}</span>
      </div>
      <h3 class="event-title">${ev.title}</h3>
      ${ev.subtitle ? `<p class="event-sub">${ev.subtitle}</p>` : ''}
      ${addr ? `<p class="event-sub" style="margin-top:6px"><span style="color:var(--ink-3)">${addr}</span></p>` : ''}
      <div class="event-meta">
        ${ev.who ? `<span class="chip">${ev.who}</span>` : ''}

      <div class="action-row">

        ${phone ? `<a class="btn-action call" href="tel:${phone.replace(/\s+/g, '')}">${ICON.phone}<span>Call</span></a>` : ''}

          <span class="tz">${ev.tzAbbr || ''}</span>

        <div class="stop-main">

          ${ev.subtitle ? `<div class="stop-sub">${ev.subtitle}</div>` : ''}
          ${flagged ? `<div class="stop-sub" style="margin-top:6px"><span class="chip flag">⚠ ${flagged}</span></div>` : ''}
          ${metaEntries.length ? `
            <dl class="detail-list">
              ${metaEntries.map(([k, v]) => `
                <dt>${k}</dt>
                <dd${k === 'Confirmation' ? ' class="mono"' : ''}>${v == null ? '—' : escapeHTML(String(v))}</dd>
              `).join('')}

          <div class="action-row" style="margin-top:10px;padding-top:10px">
            ${ev.lat && ev.lng ? `<a class="btn-action primary" href="${mapsLinkFor(ev.lat, ev.lng, ev.title)}" target="_blank" rel="noopener">${ICON.map}<span>Maps</span></a>` : ''}
            ${phone ? `<a class="btn-action call" href="tel:${phone.replace(/\s+/g, '')}">${ICON.phone}<span>Call</span></a>` : ''}
            ${conf ? `<button class="btn-action" data-copy="${conf}">Copy #</button>` : ''}
            ${stayInfo?.website ? `<a class="btn-action" href="${stayInfo.website}" target="_blank" rel="noopener">${ICON.ext}<span>Site</span></a>` : ''}

}

function escapeHTML(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ----- MAP ----- */
function renderMap() {
  const root = $('#page-map');

  /* Build pin list — one per unique stay + airports for context */
  const pins = [
    { num: '✈', label: 'Nice Airport (NCE)', sub: 'Arrival + departure', lat: 43.6598704, lng: 7.2142012, kind: 'airport' },
    { num: 1, label: 'Hameau des Baux', sub: 'Provence — May 21–25', lat: 43.7269011, lng: 4.7882359, stay: 'hameau' },
    { num: 2, label: 'Hôtel Liautaud', sub: 'Cassis — May 25–27', lat: 43.2140091, lng: 5.5384713, stay: 'liautaud' },
    { num: 3, label: 'Les Roches Rouges', sub: 'Saint-Raphaël — May 27–28', lat: 43.4168663, lng: 6.837302, stay: 'rochesRouges' },
    { num: 4, label: 'Hôtel Albert 1er', sub: 'Nice — May 28–29', lat: 43.6958915, lng: 7.2693671, stay: 'albert' },
    { num: 5, label: 'Hôtel du Couvent', sub: 'Nice — May 30–Jun 1', lat: 43.6971767, lng: 7.2788356, stay: 'couvent' },
  ];

  /* Bounding box across all pins, with generous padding so nothing clips. */
  const lats = pins.map(p => p.lat), lngs = pins.map(p => p.lng);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLng = Math.min(...lngs), maxLng = Math.max(...lngs);
  const padLat = Math.max((maxLat - minLat) * 0.30, 0.15);
  const padLng = Math.max((maxLng - minLng) * 0.10, 0.15);
  const vbMinLat = minLat - padLat, vbMaxLat = maxLat + padLat;
  const vbMinLng = minLng - padLng, vbMaxLng = maxLng + padLng;

  /* SVG dimensions chosen to match aspect ratio of the data so nothing distorts. */
  const dataAspect = (vbMaxLng - vbMinLng) / (vbMaxLat - vbMinLat);
  /* Cap aspect ratio for mobile: keep map roughly 1.6:1 max. */
  const W = 600;
  const H = Math.min(420, Math.max(240, W / Math.max(dataAspect * 1.4, 1.3)));
  function project(lat, lng) {
    const x = ((lng - vbMinLng) / (vbMaxLng - vbMinLng)) * W;
    const y = H - ((lat - vbMinLat) / (vbMaxLat - vbMinLat)) * H;
    return { x, y };
  }

  /* Route line through stays in order (skip airport for cleanliness) */
  const routePts = pins.filter(p => p.stay).map(p => project(p.lat, p.lng));
  const routePath = routePts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');

  let svg = `<svg class="map-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">`;
  /* Soft "Mediterranean" suggestion at bottom */
  svg += `<defs>
    <linearGradient id="sea" x1="0" y1="0.5" x2="0" y2="1">
      <stop offset="0" stop-color="#7a9bb5" stop-opacity="0"/>
      <stop offset="1" stop-color="#3d6586" stop-opacity="0.35"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
    </pattern>
  </defs>`;
  svg += `<rect width="${W}" height="${H}" fill="url(#grid)"/>`;
  /* Approximate coastline curve (very stylized) */
  svg += `<path d="M 0 ${H * 0.78} Q ${W * 0.3} ${H * 0.82} ${W * 0.55} ${H * 0.85} T ${W} ${H * 0.78} L ${W} ${H} L 0 ${H} Z" fill="url(#sea)"/>`;
  /* Route */
  svg += `<path class="map-route" d="${routePath}"/>`;
  /* Pins with labels below */
  pins.forEach((p, i) => {
    const { x, y } = project(p.lat, p.lng);
    const isAirport = p.kind === 'airport';
    const labelY = y + 28;
    /* Position label above pin if it would be cut off at the bottom */
    const useTopLabel = labelY > H - 8;
    const finalLabelY = useTopLabel ? y - 22 : labelY;
    svg += `
      <g class="map-pin ${isAirport ? 'airport' : ''}" data-pin="${i}">
        <circle class="map-pin-circle" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${isAirport ? 11 : 13}"/>
        ${isAirport
          ? `<text class="map-pin-icon" x="${x.toFixed(1)}" y="${(y + 0.5).toFixed(1)}" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,sans-serif" font-size="12">✈</text>`
          : `<text class="map-pin-num" x="${x.toFixed(1)}" y="${y.toFixed(1)}">${p.num}</text>`
        }
        <text class="map-pin-label" x="${x.toFixed(1)}" y="${finalLabelY.toFixed(1)}" text-anchor="middle" dominant-baseline="central">${p.shortLabel || p.label.replace(/^Hôtel /, '').replace(/ \(NCE\)$/, '')}</text>
      </g>
    `;
  });
  svg += `</svg>`;

  let html = `
    <div style="margin-bottom:8px">
      <span class="h-eyebrow">Overview</span>
      <h1 class="h-display">Five <em>stops</em>, one coast.</h1>
    </div>
    <div class="map-wrap">${svg}</div>
    <div class="map-list">
      ${pins.map(p => `
        <a class="map-list-item" href="${mapsLinkFor(p.lat, p.lng, p.label)}" target="_blank" rel="noopener">
          <div class="map-list-num">${p.num}</div>
          <div class="map-list-main">
            <div class="map-list-title">${p.label}</div>
            <div class="map-list-sub">${p.sub}</div>
          </div>
          <div style="color:var(--ink-3);align-self:center">${ICON.ext}</div>
        </a>
      `).join('')}
    </div>
    <p style="font-size:12px;color:var(--ink-3);margin-top:14px;font-style:italic;font-family:var(--serif);text-align:center">Coordinates from your shared Google Maps link.</p>
  `;
  root.innerHTML = html;
}

/* ----- SEARCH ----- */
function renderSearch() {
  const root = $('#page-search');
  root.innerHTML = `
    <div style="margin-bottom:8px">
      <span class="h-eyebrow">Find anything</span>
      <h1 class="h-display">What are you <em>looking for</em>?</h1>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input class="search-input" id="searchInput" type="search" placeholder="Hotel, city, conf #, restaurant…" autocomplete="off" />
      <button class="search-clear" id="searchClear" aria-label="Clear search">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="search-results" id="searchResults"></div>
    <p style="font-size:12px;color:var(--ink-3);margin-top:14px;font-style:italic;font-family:var(--serif);text-align:center">Try "Cassis", "GQ9Y2B", "Plongeoir", "Albert"…</p>
  `;

  const input = $('#searchInput');
  const clear = $('#searchClear');
  const out = $('#searchResults');

  function doSearch(q) {
    q = q.trim().toLowerCase();
    clear.classList.toggle('show', q.length > 0);
    if (!q) { out.innerHTML = ''; return; }

    /* Combine events, stays, and suggestions into a searchable corpus */
    const corpus = [];
    TRIP.events.forEach(e => {
      const fields = [e.title, e.subtitle, e.date, e.who, JSON.stringify(e.meta || {})].filter(Boolean).join(' ').toLowerCase();
      if (fields.includes(q)) corpus.push({ kind: 'event', data: e });
    });
    Object.values(TRIP.stays).forEach(s => {
      const fields = [s.name, s.region, s.address, s.conf, s.phone].filter(Boolean).join(' ').toLowerCase();
      if (fields.includes(q)) corpus.push({ kind: 'stay', data: s });
    });
    TRIP.suggestions.forEach(s => {
      const fields = [s.title, s.why, s.leg, s.tag].filter(Boolean).join(' ').toLowerCase();
      if (fields.includes(q)) corpus.push({ kind: 'suggestion', data: s });
    });

    if (!corpus.length) {
      out.innerHTML = `<div class="empty"><div class="empty-emoji">🔎</div>No matches for "${escapeHTML(q)}".</div>`;
      return;
    }

    out.innerHTML = corpus.map(item => {
      if (item.kind === 'event') {
        const e = item.data;
        return `
          <article class="event">
            <div class="event-header">
              <span class="event-time">${hl(fmtShortDate(e.date), q)} · ${fmtTime12(e.time)}<span class="tz">${e.tzAbbr || ''}</span></span>
              <span class="event-type ${e.type}">${e.type}</span>
            </div>
            <h3 class="event-title">${hl(e.title, q)}</h3>
            ${e.subtitle ? `<p class="event-sub">${hl(e.subtitle, q)}</p>` : ''}
            <div class="action-row">
              ${e.lat && e.lng ? `<a class="btn-action primary" href="${mapsLinkFor(e.lat, e.lng, e.title)}" target="_blank" rel="noopener">${ICON.map}<span>Maps</span></a>` : ''}
              ${e.meta?.Confirmation ? `<button class="btn-action" data-copy="${e.meta.Confirmation}">Copy ${hl(e.meta.Confirmation, q)}</button>` : ''}
            </div>
          </article>
        `;
      }
      if (item.kind === 'stay') {
        const s = item.data;
        return `
          <article class="event">
            <div class="event-header">
              <span class="event-time">Hotel</span>
              <span class="event-type hotel">stay</span>
            </div>
            <h3 class="event-title">${hl(s.name, q)}</h3>
            <p class="event-sub">${hl(s.address, q)}</p>
            <div class="event-meta">
              ${s.conf ? `<span class="chip">${hl('#' + s.conf, q)}</span>` : ''}
            </div>
            <div class="action-row">
              <a class="btn-action primary" href="${mapsLinkFor(s.lat, s.lng, s.name)}" target="_blank" rel="noopener">${ICON.map}<span>Maps</span></a>
              ${s.phone ? `<a class="btn-action call" href="tel:${s.phone.replace(/\s+/g, '')}">${ICON.phone}<span>Call</span></a>` : ''}
              ${s.conf ? `<button class="btn-action" data-copy="${s.conf}">Copy #</button>` : ''}
            </div>
          </article>
        `;
      }
      const s = item.data;
      return `
        <article class="event">
          <div class="event-header">
            <span class="event-time">Suggestion · ${s.leg}</span>
            <span class="event-type activity">idea</span>
          </div>
          <h3 class="event-title">${hl(s.title, q)}</h3>
          <p class="event-sub">${hl(s.why, q)}</p>
          <div class="action-row">
            <a class="btn-action primary" href="${mapsLinkFor(s.lat, s.lng, s.title)}" target="_blank" rel="noopener">${ICON.map}<span>Maps</span></a>
          </div>
        </article>
      `;
    }).join('');

    wireEventCardButtons(out);
  }

  function hl(text, q) {
    if (!q) return escapeHTML(text);
    const idx = text.toLowerCase().indexOf(q);
    if (idx === -1) return escapeHTML(text);
    return escapeHTML(text.slice(0, idx)) + `<mark class="hl">${escapeHTML(text.slice(idx, idx + q.length))}</mark>` + escapeHTML(text.slice(idx + q.length));
  }

  input.addEventListener('input', () => doSearch(input.value));
  clear.addEventListener('click', () => { input.value = ''; doSearch(''); input.focus(); });
  setTimeout(() => input.focus(), 80);
}

/* =============================================================
   COMMON WIRING
   ============================================================= */
function wireEventCardButtons(root) {
  $$('[data-copy]', root).forEach(btn => {
    btn.addEventListener('click', () => {
      const text = btn.getAttribute('data-copy');
      navigator.clipboard?.writeText(text).then(() => {
        const old = btn.textContent;
        btn.textContent = '✓ Copied';
        setTimeout(() => { btn.textContent = old; }, 1400);
      });
    });
  });
}

/* =============================================================
   NAV / TABS / THEME
   ============================================================= */
function showTab(name) {
  $$('.page').forEach(p => p.hidden = true);
  $(`#page-${name}`).hidden = false;
  $$('.tab').forEach(t => t.setAttribute('aria-selected', t.dataset.tab === name));
  /* Render lazily */
  if (name === 'today') renderToday();
  if (name === 'itinerary') renderItinerary();
  if (name === 'map') renderMap();
  if (name === 'suggest') renderSuggest();
  if (name === 'search') renderSearch();
  /* Scroll up */
  window.scrollTo({ top: 0, behavior: 'instant' });
  /* Persist tab for return */
  try { localStorage.setItem('sof.tab', name); } catch (e) {}
}

$$('.tab').forEach(t => {
  t.addEventListener('click', () => showTab(t.dataset.tab));
});

/* Theme */
function initTheme() {
  let stored = null;
  try { stored = localStorage.getItem('sof.theme'); } catch (e) {}
  if (stored) document.documentElement.setAttribute('data-theme', stored);
}
$('#themeToggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme') ||
    (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('sof.theme', next); } catch (e) {}
});

/* =============================================================
   PWA — MANIFEST + SERVICE WORKER (inlined as Blob URLs)
   This is how we keep everything in a single .html file.
   ============================================================= */
function setupPWA() {
  /* Manifest */
  const manifest = {
    name: 'South of France · Beukelman 2026',
    short_name: 'South of France',
    description: 'Trip companion for the Beukelman South of France trip.',
    start_url: location.pathname,
    scope: location.pathname,
    display: 'standalone',
    orientation: 'portrait',
    background_color: '#f5ede1',
    theme_color: '#1a3a3a',
    icons: [
      {
        src: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%231a3a3a'/><stop offset='1' stop-color='%23d97757'/></linearGradient></defs><rect width='512' height='512' rx='112' fill='url(%23g)'/><text x='50%25' y='50%25' text-anchor='middle' font-family='Georgia,serif' font-size='150' font-style='italic' fill='%23f5ede1' dominant-baseline='central'>SoF</text><text x='50%25' y='78%25' text-anchor='middle' font-family='Georgia,serif' font-size='38' fill='%23f5ede1' opacity='0.85' letter-spacing='8'>MAY · 2026</text></svg>",
        sizes: '512x512',
        type: 'image/svg+xml',
        purpose: 'any maskable'
      }
    ],
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const manifestUrl = URL.createObjectURL(manifestBlob);
  $('#manifest-link').setAttribute('href', manifestUrl);

  /* Service worker — only register if we're served over http(s) and the page
     has a real URL (file:// and srcdoc iframes can't host SWs). */
  if (!('serviceWorker' in navigator)) return;
  if (location.protocol !== 'http:' && location.protocol !== 'https:') return;

  const swCode = `
    const CACHE = 'sof-v1';
    const SHELL_URL = ${JSON.stringify(location.href)};
    self.addEventListener('install', e => {
      e.waitUntil((async () => {
        const cache = await caches.open(CACHE);
        try { await cache.add(new Request(SHELL_URL, { cache: 'reload' })); } catch (err) {}
        self.skipWaiting();
      })());
    });
    self.addEventListener('activate', e => {
      e.waitUntil((async () => {
        const keys = await caches.keys();
        await Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)));
        await self.clients.claim();
      })());
    });
    self.addEventListener('fetch', e => {
      const req = e.request;
      if (req.method !== 'GET') return;
      const url = new URL(req.url);
      /* Don't try to cache map deep-links or external APIs */
      if (url.origin !== location.origin && !url.hostname.includes('fonts.googleapis.com') && !url.hostname.includes('fonts.gstatic.com')) return;
      e.respondWith((async () => {
        const cache = await caches.open(CACHE);
        const cached = await cache.match(req);
        if (cached) {
          /* Background refresh */
          fetch(req).then(resp => { if (resp && resp.ok) cache.put(req, resp.clone()); }).catch(()=>{});
          return cached;
        }
        try {
          const resp = await fetch(req);
          if (resp && resp.ok) cache.put(req, resp.clone());
          return resp;
        } catch (err) {
          /* Offline fallback: serve cached shell */
          const shell = await cache.match(SHELL_URL);
          if (shell) return shell;
          return new Response('Offline', { status: 503 });
        }
      })());
    });
  `;
  const swBlob = new Blob([swCode], { type: 'text/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl, { scope: location.pathname }).catch(() => {
    /* Blob-URL service workers aren't supported in every browser; that's OK.
       The app still works fully online and most assets are cached by the browser. */
  });
}

/* Offline indicator */
function setupOfflineIndicator() {
  const pill = $('#statusPill');
  function update() {
    if (!navigator.onLine) {
      pill.textContent = 'Offline · cached data';
      pill.className = 'status-pill show offline';
      setTimeout(() => pill.classList.remove('show'), 2500);
    }
  }
  window.addEventListener('online', () => { pill.classList.remove('show'); });
  window.addEventListener('offline', update);
  if (!navigator.onLine) update();
}

/* =============================================================
   BOOT
   ============================================================= */
initTheme();
let initialTab = 'today';
try {
  const saved = localStorage.getItem('sof.tab');
  if (saved && ['today','itinerary','map','suggest','search'].includes(saved)) initialTab = saved;
} catch (e) {}
showTab(initialTab);
setupPWA();
setupOfflineIndicator();

/* Re-render Today every minute so "now/next" stays fresh */
setInterval(() => {
  if (!$('#page-today').hidden) renderToday();
}, 60000);
</script>
